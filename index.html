<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Practice Site</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            color: #333;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #1e1e2f;
            color: white;
        }

        .navbar nav a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .navbar nav a:hover {
            color: #00d4ff;
        }

        /* Hero */
        .hero {
            height: 70vh;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: white;
            color: #0072ff;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .hero button:hover {
            background: #f0f0f0;
        }

        /* Section */
        .section {
            padding: 60px 20px;
            text-align: center;
        }

        .section h2 {
            margin-bottom: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 25px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Footer */
        footer {
            padding: 20px;
            text-align: center;
            background: #1e1e2f;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">
        <h1>DevOpsLab</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Workflow</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h2>Practice Workflow & Deployment</h2>
        <p>Build, push, and deploy like a real DevOps Engineer.</p>
        <button onclick="alert('Start your DevOps journey 🚀')">Get Started</button>
    </section>

    <!-- Workflow Section -->
    <section class="section">
        <h2>DevOps Workflow</h2>
        <div class="cards">
            <div class="card">
                <h3>Code</h3>
                <p>Write clean and modular code.</p>
            </div>
            <div class="card">
                <h3>Commit</h3>
                <p>Push your code using Git.</p>
            </div>
            <div class="card">
                <h3>Deploy</h3>
                <p>Automate deployment with CI/CD.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 DevOps Practice Project</p>
    </footer>

</body>
</html>
